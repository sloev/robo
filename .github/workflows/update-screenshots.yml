name: Update Screenshots

on:
  push:
    branches: [ main, master ]
    paths:
      - 'static/**'
  workflow_dispatch:

jobs:
  update-screenshots:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Puppeteer
      run: |
        npm init -y
        npm install puppeteer

    - name: Install System Dependencies for Headless Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y libgbm-dev wget unzip fontconfig locales gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libnss3 lsb-release xdg-utils

    - name: Generate Screenshot
      run: node scripts/update_screenshots.js

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add screenshots/dashboard.jpg
        # Only commit and push if there are modified files
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard screenshots" && git push)
