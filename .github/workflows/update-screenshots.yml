name: Update Screenshots

on:
  push:
    branches: [ main, master ]
    paths:
      - 'static/**'
  workflow_dispatch:

jobs:
  update-screenshots:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Puppeteer
      run: |
        npm init -y
        npm install puppeteer

    - name: Install System Dependencies for Headless Chrome
      run: |
        sudo npx puppeteer browsers install chrome --install-deps

    - name: Generate Screenshot
      run: node scripts/update_screenshots.js

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add screenshots/*.jpg
        # Only commit and push if there are modified files
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard screenshots" && git push)
