name: Render OpenSCAD Chassis

on:
  push:
    paths:
      - '*.scad'
      - 'Makefile'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad openctm-tools xvfb

      - name: Create screenshots directory if missing
        run: mkdir -p screenshots

      - name: Render STLs, OBJs, and Screenshot
        run: |
          xvfb-run make render-vehicle

      - name: Commit Generated Assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-render latest SCAD assets and screenshots"
          file_pattern: "screenshots/*.png *.stl *.obj *.zip"
