name: Render OpenSCAD Chassis

on:
  push:
    paths:
      - '*.scad'
      - 'Makefile'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      lid: ${{ steps.filter.outputs.lid }}
      couplers: ${{ steps.filter.outputs.couplers }}
      phone_clamp: ${{ steps.filter.outputs.phone_clamp }}
      showcase: ${{ steps.filter.outputs.showcase }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'lego_robot_base.scad'
              - 'lego_robot_common.scad'
              - 'Makefile'
            lid:
              - 'lego_robot_lid.scad'
              - 'lego_robot_common.scad'
              - 'Makefile'
            couplers:
              - 'lego_robot_couplers.scad'
              - 'lego_robot_common.scad'
              - 'Makefile'
            phone_clamp:
              - 'lego_robot_phone_clamp.scad'
              - 'lego_robot_common.scad'
              - 'Makefile'
            showcase:
              - '*.scad'
              - 'Makefile'

  render-base:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.base == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y openscad xvfb
      - name: Render Base
        shell: bash
        run: ./ci_render_part.sh base lego_robot_base.scad
      - uses: actions/upload-artifact@v4
        with:
          name: asset-base
          path: |
            vehicle_base.stl
            screenshots/vehicle_base_render.png

  render-lid:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.lid == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y openscad xvfb
      - name: Render Lid
        shell: bash
        run: ./ci_render_part.sh lid lego_robot_lid.scad
      - uses: actions/upload-artifact@v4
        with:
          name: asset-lid
          path: |
            vehicle_lid.stl
            screenshots/vehicle_lid_render.png

  render-couplers:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.couplers == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y openscad xvfb
      - name: Render Couplers
        shell: bash
        run: ./ci_render_part.sh couplers lego_robot_couplers.scad
      - uses: actions/upload-artifact@v4
        with:
          name: asset-couplers
          path: |
            vehicle_couplers.stl
            screenshots/vehicle_couplers_render.png

  render-phone-clamp:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.phone_clamp == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y openscad xvfb
      - name: Render Phone Clamp
        shell: bash
        run: ./ci_render_part.sh phone_clamp lego_robot_phone_clamp.scad
      - uses: actions/upload-artifact@v4
        with:
          name: asset-phone-clamp
          path: |
            vehicle_phone_clamp.stl
            screenshots/vehicle_phone_clamp_render.png

  render-showcase:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.showcase == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y openscad xvfb
      - name: Render Showcase
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a make -B screenshots/vehicle_render.png
          test -s screenshots/vehicle_render.png
      - uses: actions/upload-artifact@v4
        with:
          name: asset-showcase
          path: screenshots/vehicle_render.png

  commit-assets:
    needs: [detect-changes, render-base, render-lid, render-couplers, render-phone-clamp, render-showcase]
    # Only run if no upstream render job failed (skipped jobs are fine).
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
      - name: Sync artifacts to repo
        shell: bash
        run: |
          set -euo pipefail

          # Copy downloaded artifacts into their correct locations
          find downloaded-artifacts -type f -name "*.stl" -exec cp {} . \;
          mkdir -p screenshots
          find downloaded-artifacts -type f -name "*.png" -exec cp {} screenshots/ \;

          # Verify all expected STL files exist AND are non-empty, so a broken
          # render can never silently ship stale geometry to the website.
          for file in vehicle_base.stl vehicle_lid.stl vehicle_couplers.stl vehicle_phone_clamp.stl; do
            if [ ! -s "$file" ]; then
              echo "::error::Expected artifact $file is missing or empty!"
              exit 1
            fi
          done

          # Rebuild the master ZIP archive containing all current parts.
          zip -j vehicle_models.zip vehicle_base.stl vehicle_lid.stl vehicle_couplers.stl vehicle_phone_clamp.stl

          # Clean up downloaded-artifacts so they don't get committed by accident
          rm -rf downloaded-artifacts
      - name: Pull latest changes to avoid push conflicts
        run: |
          git config pull.rebase true
          git pull origin master
      - name: Commit Generated Assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-render changed SCAD assets and screenshots"
          file_pattern: "screenshots/*.png *.stl *.zip"
      - name: Trigger Pages Deployment
        run: gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
