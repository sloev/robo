name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'static/**'
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
        
      - name: Prepare Pages
        run: |
          mkdir public
          cp -r website/* public/
          cp -r static public/ui-demo
          
          # Build LittleFS filesystem image
          pip install littlefs-python
          python build_fs.py
          
          # Create install directory for web flasher
          mkdir -p public/install
          mv robo-filesystem.bin public/install/
          
          # Download MicroPython ESP32-S2 Firmware
          wget https://micropython.org/resources/firmware/ESP32_GENERIC_S2-20240602-v1.23.0.bin -O public/install/firmware.bin
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
